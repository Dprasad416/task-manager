apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: taskmanager-ingress

spec:
  ingressClassName: alb

  rules:
  - host: taskmanager.durgaprasad.shop

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: taskmanager-service

            port:
              number: 80